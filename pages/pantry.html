<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrepPal - Pantry</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <div class="logo">PrepPal</div>
    <nav>
        <ul>
            <li><a href="recipe.html">Recipes</a></li>
            <li><a href="plan.html">Weekly Plan</a></li>
            <li><a href="pantry.html">Pantry</a></li>
            <li><a href="grocery.html">Grocery List</a></li>
            <li><a href="notification.html">Notifications</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <section class="page-header">
        <h1>My Pantry Storage</h1>
        <button class="btn-add" onclick="openModal('pantryModal')">Add Ingredient +</button>
    </section>

    <table class="plan-table">
        <thead>
            <tr>
                <th>Ingredient</th>
                <th>Quantity</th>
                <th>Unit</th>
                <th>Expiry Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="pantryBody">
            </tbody>
    </table>
</main>

<div id="pantryModal" class="modal">
    <div class="modal-content">
        <h2 id="pantryModalTitle">Add to Pantry</h2>
        <form id="pantryForm">
            <input type="text" id="panName" placeholder="Ingredient Name (e.g. Eggs)" required>
            <input type="number" id="panQty" placeholder="Quantity" required>
            <input type="text" id="panUnit" placeholder="Unit (e.g. kg, pcs, ml)">
            <input type="date" id="panExpiry">
            <button type="submit" class="btn-add">Save Item</button>
            <button type="button" onclick="closeModal('pantryModal')">Cancel</button>
        </form>
    </div>
</div>

<script src="../js/app.js"></script>
</body>
</html>
