<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PrepPal - My Recipes</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <div class="logo">PrepPal</div>
    <nav>
        <ul>
            <li><a href="recipe.html">Recipes</a></li>
            <li><a href="plan.html">Weekly Plan</a></li>
            <li><a href="pantry.html">Pantry</a></li>
            <li><a href="grocery.html">Grocery List</a></li>
            <li><a href="notification.html">Notifications</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <section class="page-header">
        <h1>My Recipes</h1>
        <button class="btn-add" onclick="openModal('recipeModal')">Add Recipe +</button>
    </section>

    <section class="recipe-grid" id="recipeGrid">
    </section>
</main>

<div id="recipeModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">New Recipe</h2>
        <form id="recipeForm">
            <div class="form-group">
                <label for="recTitle">Recipe Title</label>
                <input type="text" id="recTitle" placeholder="e.g. Desi Omelette" required>
            </div>

            <div class="form-group">
                <label for="recImg">Image URL</label>
                <input type="text" id="recImg" placeholder="https://images.unsplash.com/...">
                <small>Tip: Use direct image links for best results.</small>
            </div>

            <div class="form-group">
                <label for="recIngredients">Ingredients</label>
                <textarea id="recIngredients" placeholder="Format -> item:qty, item:qty (e.g. eggs:2, milk:1)"></textarea>
            </div>

            <div class="form-group">
                <label for="recMethod">Cooking Method</label>
                <textarea id="recMethod" rows="5" placeholder="Step 1: Whisk eggs..."></textarea>
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn-add">Save Recipe</button>
                <button type="button" class="btn-cancel" onclick="closeModal('recipeModal')">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/app.js"></script>

</body>
</html>
